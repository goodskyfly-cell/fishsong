<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕魚歌 - 全曲完整循環版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .control-panel { background: #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; width: 95%; max-width: 900px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        audio { margin: 10px 0; width: 100%; height: 45px; }
        
        #countdown { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12rem; font-weight: 900; z-index: 100; display: none; pointer-events: none; text-shadow: 0 0 30px rgba(0,0,0,0.8); }

        .page-indicator { margin: 10px 0; display: flex; gap: 10px; justify-content: center; }
        .page-btn { background: #444; border: 1px solid #666; color: #aaa; padding: 8px 25px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; }
        .page-btn.active { background: #e67e22; color: white; font-weight: bold; border-color: #ff9f43; }

        .page-content { display: none; width: 95%; max-width: 1100px; }
        .page-content.active { display: block; }
        .lyrics-row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-bottom: 20px; }

        .beat-box { background: #2d3436; padding: 25px 2px; text-align: center; border-radius: 12px; transition: all 0.1s ease; display: flex; flex-direction: column; align-items: center; opacity: 0.2; border: 2px solid #3d4446; }
        .beat-box.highlight { background: #f1c40f; color: black !important; transform: scale(1.12); box-shadow: 0 0 25px #f1c40f; opacity: 1; border: 3px solid #fff; z-index: 10; }
        
        .action { display: block; font-size: 2.6rem; font-weight: bold; color: #ff7675; line-height: 1.1; }
        .beat-box.highlight .action { color: #d63031; }
        .lyrics { display: block; font-size: 2rem; margin-top: 10px; font-weight: bold; }
        
        .config-row { display: flex; justify-content: center; gap: 15px; font-size: 0.95rem; margin-top: 10px; color: #fbc531; flex-wrap: wrap; }
        input { background: #222; color: #fff; border: 1px solid #fbc531; width: 60px; text-align: center; border-radius: 4px; font-size: 1.1rem; padding: 3px; }
        #status { font-weight: bold; margin-top: 5px; font-size: 1.3rem; height: 35px; color: #f1c40f; }

        @media (max-width: 900px) {
            .lyrics-row { grid-template-columns: repeat(4, 1fr); }
            .action { font-size: 1.8rem; }
            .lyrics { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="countdown"></div>

    <div class="control-panel">
        <audio id="bgMusic" controls>
            <source src="https://raw.githubusercontent.com/goodskyfly-cell/fishsong/main/fishing_song.mp3" type="audio/mpeg">
        </audio>
        <div id="status">準備就緒</div>
        
        <div class="page-indicator">
            <button class="page-btn active" id="btn1">第一遍唱完</button>
            <button class="page-btn" id="btn2">第二遍唱完</button>
        </div>

        <div class="config-row">
            <div>BPM: <input type="number" id="bpmInput" value="130"></div>
            <div>第一遍開始(秒): <input type="number" id="delay1Input" value="7.5" step="0.1"></div>
            <div>第二遍開始(秒): <input type="number" id="delay2Input" value="44.0" step="0.1"></div>
        </div>
    </div>

    <div id="page1" class="page-content active">
        <div class="lyrics-row" id="row1-1"></div>
        <div class="lyrics-row" id="row1-2"></div>
        <div class="lyrics-row" id="row1-3"></div>
        <div class="lyrics-row" id="row1-4"></div>
    </div>

    <div id="page2" class="page-content">
        <div class="lyrics-row" id="row2-1"></div>
        <div class="lyrics-row" id="row2-2"></div>
        <div class="lyrics-row" id="row2-3"></div>
        <div class="lyrics-row" id="row2-4"></div>
    </div>

    <script>
        // 定義一次完整演唱的歌詞 (32格)
        const fullLyrics = [
            { a: "拍", l: "白" }, { a: "拍", l: "浪" }, { a: "打打", l: "滔" }, { a: "打", l: "滔" },
            { a: "拍", l: "我" }, { a: "拿", l: "不" }, { a: "放", l: "怕" }, { a: "～", l: "，" },
            { a: "拍", l: "掌" }, { a: "拿", l: "穩" }, { a: "碰", l: "舵" }, { a: "敲", l: "兒" },
            { a: "換", l: "往" }, { a: "手", l: "前" }, { a: "放", l: "划" }, { a: "～", l: "，" },
            { a: "拍", l: "撒" }, { a: "拍", l: "網" }, { a: "打打", l: "下" }, { a: "打", l: "水" },
            { a: "拍", l: "到" }, { a: "拿", l: "魚" }, { a: "放", l: "家" }, { a: "～", l: "，" },
            { a: "拍", l: "捕" }, { a: "拿", l: "條" }, { a: "碰", l: "大" }, { a: "敲", l: "魚" },
            { a: "換", l: "笑" }, { a: "手", l: "哈" }, { a: "放", l: "哈" }, { a: "～", l: "。" }
        ];

        // 複製成兩遍
        const songData = [...fullLyrics, ...fullLyrics];

        const audio = document.getElementById('bgMusic');
        const bpmInput = document.getElementById('bpmInput');
        const delay1Input = document.getElementById('delay1Input');
        const delay2Input = document.getElementById('delay2Input');
        const statusText = document.getElementById('status');
        const countdownEl = document.getElementById('countdown');
        const allRows = [
            document.getElementById('row1-1'), document.getElementById('row1-2'), document.getElementById('row1-3'), document.getElementById('row1-4'),
            document.getElementById('row2-1'), document.getElementById('row2-2'), document.getElementById('row2-3'), document.getElementById('row2-4')
        ];
        
        let timer = null, currentIndex = 0;

        songData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'beat-box';
            div.id = 'box-' + index;
            div.innerHTML = `<span class="action">${item.a}</span><span class="lyrics">${item.l}</span>`;
            allRows[Math.floor(index / 8)].appendChild(div);
        });

        function showPage(num) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            document.getElementById('btn' + num).classList.add('active');
        }

        function handleCountdown(currentTime, targetTime) {
            const timeLeft = targetTime - currentTime;
            if (timeLeft <= 3 && timeLeft > 0) {
                countdownEl.style.display = 'block';
                const count = Math.ceil(timeLeft);
                countdownEl.innerText = count;
                countdownEl.style.color = count === 3 ? "#3498db" : (count === 2 ? "#f39c12" : "#e74c3c");
            } else { countdownEl.style.display = 'none'; }
        }

        function playStep() {
            document.querySelectorAll('.beat-box').forEach(b => b.classList.remove('highlight'));
            if (currentIndex < songData.length) {
                document.getElementById('box-' + currentIndex).classList.add('highlight');
                currentIndex++;
                // 唱完第一遍 (32格) 停止，等待間奏
                if (currentIndex === 32) { stopBeatTimer(); statusText.innerText = "第一遍唱完，間奏中..."; }
            } else {
                stopBeatTimer(); statusText.innerText = "全部演唱完成！";
            }
        }

        function stopBeatTimer() { clearInterval(timer); timer = null; }

        audio.ontimeupdate = function() {
            const currentTime = audio.currentTime;
            const d1 = parseFloat(delay1Input.value), d2 = parseFloat(delay2Input.value);
            const interval = 60000 / parseInt(bpmInput.value);

            if (currentIndex === 0) handleCountdown(currentTime, d1);
            if (currentTime >= d1 && currentTime < d1 + 0.3 && currentIndex === 0 && !timer) {
                showPage(1); timer = setInterval(playStep, interval); statusText.innerText = "第一遍：開始！";
            }

            if (currentIndex === 32) handleCountdown(currentTime, d2);
            if (currentTime >= d2 && currentTime < d2 + 0.3 && currentIndex === 32 && !timer) {
                showPage(2); timer = setInterval(playStep, interval); statusText.innerText = "第二遍：開始！";
            }
        };

        audio.onplay = () => { if (audio.currentTime < 1) { currentIndex = 0; showPage(1); } };
        audio.onpause = stopBeatTimer;
        audio.onseeked = () => { location.reload(); }; 
    </script>
</body>
</html>
