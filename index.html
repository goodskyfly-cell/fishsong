<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕魚歌 - 專業教學版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .control-panel { background: #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: center; width: 95%; max-width: 900px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        audio { margin: 10px 0; width: 100%; height: 40px; }
        
        .page-indicator { margin: 10px 0; display: flex; gap: 10px; justify-content: center; }
        .page-btn { background: #555; border: none; color: white; padding: 8px 25px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; }
        .page-btn.active { background: #e67e22; font-weight: bold; }

        .page-content { display: none; width: 95%; max-width: 1000px; }
        .page-content.active { display: block; }

        /* 設定每行 8 格 */
        .lyrics-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .beat-box { 
            background: #2d3436; 
            padding: 20px 2px; 
            text-align: center; 
            border-radius: 10px; 
            transition: all 0.1s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            opacity: 0.3; 
            border: 2px solid #444;
        }
        
        .beat-box.highlight { 
            background: #f1c40f; 
            color: black; 
            transform: scale(1.1); 
            box-shadow: 0 0 20px #f1c40f; 
            opacity: 1; 
            border: 3px solid #fff; 
            z-index: 10;
        }
        
        .action { display: block; font-size: 2.4rem; font-weight: bold; color: #ff7675; line-height: 1.1; }
        .beat-box.highlight .action { color: #d63031; }
        .lyrics { display: block; font-size: 1.8rem; margin-top: 8px; font-weight: bold; }
        
        .config-row { display: flex; justify-content: center; gap: 20px; font-size: 1rem; margin-top: 10px; color: #fbc531; }
        input { background: #444; color: white; border: 1px solid #fbc531; width: 60px; text-align: center; border-radius: 4px; font-size: 1rem; padding: 2px; }
        #status { font-weight: bold; margin-top: 5px; font-size: 1.3rem; height: 35px; color: #2ecc71; }

        /* 手機版自動調整為 4 格兩排 */
        @media (max-width: 800px) {
            .lyrics-row { grid-template-columns: repeat(4, 1fr); }
            .action { font-size: 1.8rem; }
            .lyrics { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <audio id="bgMusic" controls>
            <source src="https://raw.githubusercontent.com/goodskyfly-cell/fishsong/main/fishing_song.mp3" type="audio/mpeg">
        </audio>

        <div id="status">準備緒就...</div>
        
        <div class="page-indicator">
            <button class="page-btn active" id="btnPage1" onclick="showPage(1)">第一段 (白浪...)</button>
            <button class="page-btn" id="btnPage2" onclick="showPage(2)">第二段 (撒網...)</button>
        </div>

        <div class="config-row">
            <div>節奏 BPM: <input type="number" id="bpmInput" value="130"></div>
            <div>前奏延遲 (秒): <input type="number" id="delayInput" value="7.5" step="0.1"></div>
        </div>
    </div>

    <div id="page1" class="page-content active">
        <div class="lyrics-row" id="row1-1"></div> <div class="lyrics-row" id="row1-2"></div> </div>

    <div id="page2" class="page-content">
        <div class="lyrics-row" id="row2-1"></div> <div class="lyrics-row" id="row2-2"></div> </div>

    <script>
        const songData = [
            // 第一段 (Page 1)
            { a: "拍", l: "白" }, { a: "拍", l: "浪" }, { a: "打打", l: "滔" }, { a: "打", l: "滔" },
            { a: "拍", l: "我" }, { a: "拿", l: "不" }, { a: "放", l: "怕" }, { a: "～", l: "，" },
            { a: "拍", l: "掌" }, { a: "拿", l: "穩" }, { a: "碰", l: "舵" }, { a: "敲", l: "兒" },
            { a: "換", l: "往" }, { a: "手", l: "前" }, { a: "放", l: "划" }, { a: "～", l: "，" },
            // 第二段 (Page 2)
            { a: "拍", l: "撒" }, { a: "拍", l: "網" }, { a: "打打", l: "下" }, { a: "打", l: "水" },
            { a: "拍", l: "到" }, { a: "拿", l: "魚" }, { a: "放", l: "家" }, { a: "～", l: "，" },
            { a: "拍", l: "捕" }, { a: "拿", l: "條" }, { a: "碰", l: "大" }, { a: "魚" , l: "魚" },
            { a: "換", l: "笑" }, { a: "手", l: "哈" }, { a: "放", l: "哈" }, { a: "～", l: "。" }
        ];

        const audio = document.getElementById('bgMusic');
        const bpmInput = document.getElementById('bpmInput');
        const delayInput = document.getElementById('delayInput');
        const statusText = document.getElementById('status');
        
        let timer = null;
        let delayTimer = null;
        let currentIndex = 0;

        // 初始化分頁與行
        const rows = [
            document.getElementById('row1-1'), document.getElementById('row1-2'),
            document.getElementById('row2-1'), document.getElementById('row2-2')
        ];

        songData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'beat-box';
            div.id = 'box-' + index;
            div.innerHTML = `<span class="action">${item.a}</span><span class="lyrics">${item.l}</span>`;
            
            // 分配到對應的行 (每行 8 格)
            const rowIndex = Math.floor(index / 8);
            rows[rowIndex].appendChild(div);
        });

        function showPage(num) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            document.getElementById('btnPage' + num).classList.add('active');
        }

        function playNext() {
            document.querySelectorAll('.beat-box').forEach(b => b.classList.remove('highlight'));
            
            if (currentIndex < songData.length) {
                if (currentIndex === 16) showPage(2);
                if (currentIndex === 0) showPage(1);

                const currentBox = document.getElementById('box-' + currentIndex);
                if (currentBox) currentBox.classList.add('highlight');
                currentIndex++;
            } else {
                clearAllTimers();
                statusText.innerText = "完成！";
            }
        }

        audio.onplay = function() {
            clearAllTimers();
            showPage(1);
            const delayTime = parseFloat(delayInput.value) * 1000;
            statusText.innerText = "前奏開始，請準備...";
            
            delayTimer = setTimeout(() => {
                statusText.innerText = "🎶 開始！";
                const interval = 60000 / parseInt(bpmInput.value);
                currentIndex = 0;
                playNext(); 
                timer = setInterval(playNext, interval);
            }, delayTime);
        };

        audio.onpause = function() { clearAllTimers(); statusText.innerText = "暫停中"; };

        function clearAllTimers() {
            if(timer) clearInterval(timer);
            if(delayTimer) clearTimeout(delayTimer);
            timer = null; delayTimer = null;
        }
    </script>
</body>
</html>
