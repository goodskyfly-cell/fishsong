<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕魚歌 - 完整引導版</title>
    <style>
        :root { --primary-orange: #ff8c00; --active-purple: #7E3FF2; --border-green: #00CBA9; --btn-gray: #f0f0f0; --btn-text: #5f6368; --btn-active-text: #ff0000; }
        body { font-family: "Noto Sans TC", sans-serif; background-color: #222; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow: hidden; }
        .header-panel { background: #444; padding: 10px; border-radius: 15px; width: 95%; max-width: 900px; text-align: center; margin-bottom: 5px; z-index: 100; }
        audio { width: 100%; filter: invert(100%); height: 35px; }
        .controls { display: flex; justify-content: center; gap: 12px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .btn-base { border: none; padding: 8px 18px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .btn-nav { background: var(--primary-orange); color: white; }
        .btn-reset { background: #d63031; color: white; }
        .btn-speed { background: var(--btn-gray); color: var(--btn-text); min-width: 70px; }
        .btn-speed.active { background: var(--active-purple); color: var(--btn-active-text); }
        
        .display-container { background: white; border: 8px solid var(--border-green); border-radius: 25px; width: 98vw; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; color: #333; overflow: hidden; }
        .rhythm-row { display: flex; justify-content: center; align-items: center; width: 100%; padding: 0 2vw; box-sizing: border-box; white-space: nowrap; }
        .action-word { font-size: clamp(24px, 5.5vw, 95px); font-weight: 900; padding: 0 0.2vw; }
        .divider { font-size: clamp(24px, 5.5vw, 95px); color: #ddd; font-weight: 300; margin: 0 1.5vw; }
        #bouncingDot { position: absolute; width: clamp(25px, 4vw, 45px); height: clamp(25px, 4vw, 45px); background-color: var(--active-purple); border-radius: 50%; display: none; z-index: 10; pointer-events: none; }
        #practiceArea { display: flex; width: 100%; height: 100%; display: none; }
        .action-word.active { color: var(--active-purple) !important; transform: scale(1.1); }
        
        /* 標題與倒數樣式 */
        .big-title { font-size: clamp(80px, 15vw, 180px); color: #333; font-weight: 900; }
        .ready-text { font-size: clamp(80px, 15vw, 180px); color: var(--primary-orange); font-weight: 900; }
        .countdown { font-size: clamp(120px, 25vw, 300px); color: var(--active-purple); font-weight: 900; }
        
        .finish-msg { font-size: clamp(40px, 8vw, 100px); color: var(--active-purple); font-weight: 900; text-align: center; }
        .status-msg { font-size: clamp(30px, 6vw, 60px); color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-panel">
        <audio id="bgMusic" controls src="https://raw.githubusercontent.com/goodskyfly-cell/fishsong/main/fishing_song.mp3"></audio>
        <div class="controls">
            <button class="btn-base btn-nav" onclick="jumpTo(7.3)">第一段</button>
            <button class="btn-base btn-nav" style="background:#8e44ad" onclick="jumpTo(44.3)">第二段</button>
            <button class="btn-base btn-reset" onclick="location.reload()">重置</button>
            <button class="btn-base btn-speed" onclick="setSpeed(0.5, this)">50%</button>
            <button class="btn-base btn-speed" onclick="setSpeed(0.75, this)">75%</button>
            <button class="btn-base btn-speed active" onclick="setSpeed(1.0, this)">100%</button>
            <button class="btn-base btn-speed" onclick="setSpeed(1.25, this)">125%</button>
            <button class="btn-base btn-speed" onclick="setSpeed(1.5, this)">150%</button>
        </div>
    </div>

    <div class="display-container" id="screen">
        <div id="bouncingDot"></div>
        <div id="statusArea"></div>
        <div id="practiceArea"></div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic'), dot = document.getElementById('bouncingDot');
        const status = document.getElementById('statusArea'), practice = document.getElementById('practiceArea');
        const BPM = 130, beat = 60 / BPM, p1Start = 7.3, p2Start = 44.3;

        const page1 = [{w:"|",m:true},{w:"拍"},{w:"拍"},{w:"|",m:true},{w:"打",d:0.5},{w:"打",d:0.5},{w:"打",d:0.5},{w:"",d:0.5,r:true},{w:"|",m:true},{w:"拍"},{w:"拿",c:"take"},{w:"|",m:true},{w:"放",c:"put"},{w:"～",c:"put"}];
        const page2 = [{w:"|",m:true},{w:"拍"},{w:"拿",c:"take"},{w:"|",m:true},{w:"碰"},{w:"敲"},{w:"|",m:true},{w:"換"},{w:"手"},{w:"|",m:true},{w:"放",c:"put"},{w:"～",c:"put"}];
        const page3 = [{w:"|",m:true},{w:"嗨"},{w:"喲"},{w:"|",m:true},{w:"依",d:0.5},{w:"喲",d:0.5},{w:"依",d:0.5},{w:"喲",d:0.5},{w:"|",m:true},{w:"哼"},{w:"嗨"},{w:"|",m:true},{w:"喲"},{w:"～"}];

        const sequence = [page1, page2, page1, page2, page3, page3, page3, page3];
        const fullData = [];
        sequence.forEach((s, sIdx) => { s.forEach((it, iIdx) => { if(!it.m) fullData.push({...it, sIdx, iIdx}); }); });

        function setSpeed(rate, el) { audio.playbackRate = rate; document.querySelectorAll('.btn-speed').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function jumpTo(time) { audio.currentTime = (time === 7.3) ? 0 : time - 3.8; audio.play(); }

        let lastM = "";
        function update() {
            const time = audio.currentTime, pageTime = 8 * beat; 
            let m = "IDLE"; let currentOffset = 0;

            if (audio.ended) m = "FINISH";
            else if (time < 2.3) m = "TITLE"; // 顯示捕魚歌
            else if (time < 4.3) m = "READY"; // 顯示預備
            else if (time < p1Start) m = "C1"; // 倒數 321
            else if (time < p1Start + pageTime * 8) { m = "P1"; currentOffset = time - p1Start; }
            else if (time < p2Start - 3) m = "INT"; 
            else if (time < p2Start) m = "C2";
            else if (time < p2Start + pageTime * 8) { m = "P2"; currentOffset = time - p2Start; }
            else m = "WAIT_END";

            if (m !== lastM) { 
                status.innerHTML = ""; practice.innerHTML = ""; practice.style.display="none"; 
                dot.style.display = "none"; lastM = m; delete practice.dataset.page;
            }

            if (m === "TITLE") status.innerHTML = '<div class="big-title">捕魚歌</div>';
            else if (m === "READY") status.innerHTML = '<div class="ready-text">預備</div>';
            else if (m === "C1" || m === "C2") {
                let target = (m === "C1") ? p1Start : p2Start;
                status.innerHTML = `<div class="countdown">${Math.ceil(target - time)}</div>`;
            } else if (m === "P1" || m === "P2") {
                let currentPageIdx = Math.floor(currentOffset / pageTime);
                if (currentPageIdx < 8) render(currentOffset % pageTime, currentPageIdx);
            } else if (m === "FINISH") status.innerHTML = '<div class="finish-msg">太棒了！<br>你完成了練習 👏</div>';
            else if (m === "INT" || m === "WAIT_END") status.innerHTML = `<div class="status-msg">${m === "INT" ? "好棒！準備第二段..." : "練習結束，休息一下"}</div>`;
            
            requestAnimationFrame(update);
        }

        function render(elapsedInPage, targetIdx) {
            practice.style.display = "flex";
            if (practice.dataset.page != targetIdx) {
                practice.innerHTML = '<div class="rhythm-row">';
                sequence[targetIdx].forEach((it, i) => {
                    if(it.m) practice.lastChild.innerHTML += `<span class="divider">|</span>`;
                    else if(it.w) practice.lastChild.innerHTML += `<span class="action-word ${it.c||''}" id="w-${targetIdx}-${i}">${it.w}</span>`;
                });
                practice.dataset.page = targetIdx;
            }
            let acc = 0, act = -1, pageData = fullData.filter(d => d.sIdx === targetIdx);
            for (let i = 0; i < pageData.length; i++) {
                acc += (pageData[i].d || 1) * beat;
                if (elapsedInPage < acc) { act = i; break; }
            }
            if (act !== -1) {
                const it = pageData[act], el = document.getElementById(`w-${targetIdx}-${it.iIdx}`);
                if (el && !it.r) {
                    const r = el.getBoundingClientRect(), s = document.getElementById('screen').getBoundingClientRect();
                    dot.style.display = "block";
                    dot.style.left = (r.left - s.left + r.width/2 - dot.offsetWidth/2) + 'px';
                    dot.style.top = (r.top - s.top - (r.height * 0.8)) + 'px';
                    document.querySelectorAll('.action-word').forEach(w => w.classList.remove('active'));
                    el.classList.add('active');
                } else { dot.style.display = "none"; }
            }
        }
        update();
    </script>
</body>
</html>
