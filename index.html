<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕魚歌 - 前奏延遲同步版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .control-panel { background: #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; width: 100%; max-width: 800px; }
        audio { margin: 15px 0; width: 100%; max-width: 400px; }
        .lyrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 800px; }
        .beat-box { background: #2d3436; padding: 15px 5px; text-align: center; border-radius: 8px; transition: all 0.1s ease; display: flex; flex-direction: column; align-items: center; opacity: 0.5; }
        .beat-box.highlight { background: #f1c40f; color: black; transform: scale(1.08); box-shadow: 0 0 20px #f1c40f; opacity: 1; }
        .action { display: block; font-size: 2.2rem; font-weight: bold; color: #ff7675; line-height: 1.2; }
        .beat-box.highlight .action { color: #d63031; }
        .lyrics { display: block; font-size: 1.6rem; margin-top: 5px; }
        #status { font-weight: bold; height: 24px; }
    </style>
</head>
<body>

    <h1>🚢 捕魚歌：音樂同步 (含前奏延遲)</h1>

    <div class="control-panel">
        <audio id="bgMusic" controls>
            <source src="fishing_song.mp3" type="audio/mpeg">
        </audio>

        <div id="status" style="margin-top: 10px; color: #f1c40f;">等待播放...</div>
        
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 20px; font-size: 0.9rem;">
            <div>基準 BPM: <input type="number" id="bpmInput" value="120" style="width: 50px;"></div>
            <div>前奏延遲 (秒): <input type="number" id="delayInput" value="7" step="0.1" style="width: 50px;"></div>
        </div>
    </div>

    <div class="lyrics-grid" id="grid"></div>

    <script>
        const songData = [
            { a: "拍", l: "白" }, { a: "拍", l: "浪" }, { a: "打打", l: "滔" }, { a: "打", l: "滔" },
            { a: "拍", l: "我" }, { a: "拿", l: "不" }, { a: "放", l: "怕" }, { a: "～", l: "，" },
            { a: "拍", l: "掌" }, { a: "拿", l: "穩" }, { a: "碰", l: "舵" }, { a: "敲", l: "兒" },
            { a: "換", l: "往" }, { a: "手", l: "前" }, { a: "放", l: "划" }, { a: "～", l: "，" },
            { a: "拍", l: "撒" }, { a: "拍", l: "網" }, { a: "打打", l: "下" }, { a: "打", l: "水" },
            { a: "拍", l: "到" }, { a: "拿", l: "魚" }, { a: "放", l: "家" }, { a: "～", l: "，" },
            { a: "拍", l: "捕" }, { a: "拿", l: "條" }, { a: "碰", l: "大" }, { a: "敲", l: "魚" },
            { a: "換", l: "笑" }, { a: "手", l: "哈" }, { a: "放", l: "哈" }, { a: "～", l: "。" }
        ];

        const grid = document.getElementById('grid');
        const audio = document.getElementById('bgMusic');
        const bpmInput = document.getElementById('bpmInput');
        const delayInput = document.getElementById('delayInput');
        const statusText = document.getElementById('status');
        
        let timer = null;
        let delayTimer = null;
        let currentIndex = 0;

        songData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'beat-box';
            div.innerHTML = `<span class="action">${item.a}</span><span class="lyrics">${item.l}</span>`;
            grid.appendChild(div);
        });

        const boxes = document.querySelectorAll('.beat-box');

        function playNext() {
            boxes.forEach(b => b.classList.remove('highlight'));
            if (currentIndex < boxes.length) {
                boxes[currentIndex].classList.add('highlight');
                currentIndex++;
            } else {
                // 若音樂還在跑且已唱完歌詞，可在此設定停止或循環
                clearInterval(timer);
                statusText.innerText = "演唱結束";
            }
        }

        audio.onplay = function() {
            clearAllTimers();
            const delayTime = parseFloat(delayInput.value) * 1000;
            statusText.innerText = "前奏中，準備開始...";
            
            // 設定延遲啟動
            delayTimer = setTimeout(() => {
                statusText.innerText = "GO! 🎵";
                const interval = 60000 / parseInt(bpmInput.value);
                currentIndex = 0;
                playNext(); 
                timer = setInterval(playNext, interval);
            }, delayTime);
        };

        audio.onpause = function() {
            clearAllTimers();
            statusText.innerText = "暫停播放";
        };

        audio.onseeked = function() {
            // 如果使用者手動拉進度條，停止動畫避免亂拍
            clearAllTimers();
            boxes.forEach(b => b.classList.remove('highlight'));
            statusText.innerText = "請重新播放以同步";
        };

        function clearAllTimers() {
            if(timer) clearInterval(timer);
            if(delayTimer) clearTimeout(delayTimer);
            timer = null;
            delayTimer = null;
        }
    </script>
</body>
</html>
